<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetSave - Análise de Jogos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; color: #00d4aa; }
        header p { color: #888; margin-top: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: #1a1a2e; border: none; border-radius: 8px; color: #888; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: #00d4aa; color: #0f0f1a; font-weight: bold; }
        .tab:hover { background: #333; }
        .tab.active:hover { background: #00b894; }
        .search-section { background: #1a1a2e; border-radius: 15px; padding: 25px; margin-bottom: 20px; display: none; }
        .search-section.active { display: block; }
        .search-row { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        select, button { padding: 12px 20px; border-radius: 8px; font-size: 1rem; }
        select { background: #0f0f1a; border: 1px solid #333; color: #fff; min-width: 200px; }
        button { background: #00d4aa; border: none; color: #0f0f1a; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #00b894; transform: scale(1.02); }
        .vs { font-size: 1.5rem; color: #ff6b6b; font-weight: bold; }
        
        .matches-section { display: none; }
        .matches-section.active { display: block; }
        .date-group { margin-bottom: 30px; }
        .date-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .date-header h2 { font-size: 1.3rem; color: #00d4aa; }
        .date-header .badge { background: #333; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .match-card { background: #1a1a2e; border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .match-card:hover { border-color: #00d4aa; transform: translateY(-2px); }
        .match-card.finished { opacity: 0.85; }
        .match-card.finished:hover { opacity: 1; }
        .match-league { font-size: 0.75rem; color: #00d4aa; margin-bottom: 8px; text-transform: uppercase; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; }
        .match-team { flex: 1; font-weight: bold; font-size: 0.95rem; }
        .match-team.away { text-align: right; }
        .match-score { padding: 0 15px; font-size: 1.3rem; font-weight: bold; color: #888; }
        .match-score.finished { color: #fff; }
        .match-time { text-align: center; color: #666; font-size: 0.85rem; margin-top: 10px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; border-radius: 15px; padding: 30px; width: 100%; max-width: 1000px; margin: 20px 0; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: #ff6b6b; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .modal-close:hover { background: #ff5252; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 10px; }
        .modal-teams { display: flex; align-items: center; gap: 20px; }
        .modal-team { font-size: 1.5rem; font-weight: bold; }
        .modal-vs { color: #888; font-size: 1rem; }
        .modal-league { color: #00d4aa; font-size: 0.9rem; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #0f0f1a; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .card h3 { color: #00d4aa; margin-bottom: 15px; font-size: 1rem; }
        .lineup-table { width: 100%; border-collapse: collapse; }
        .lineup-table th, .lineup-table td { padding: 8px; text-align: left; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .lineup-table th { color: #888; font-size: 0.75rem; text-transform: uppercase; }
        .lineup-table tr:hover { background: rgba(0,212,170,0.1); }
        .player-name { font-weight: bold; }
        .player-pos { color: #888; font-size: 0.75rem; }
        
        .stats-comparison { display: flex; flex-direction: column; gap: 12px; }
        .stat-row { display: grid; grid-template-columns: 50px 1fr 80px 1fr 50px; gap: 10px; align-items: center; }
        .stat-row .home-val { text-align: right; color: #00d4aa; font-weight: bold; }
        .stat-row .away-val { color: #ff6b6b; font-weight: bold; }
        .stat-row .label { text-align: center; color: #888; font-size: 0.8rem; }
        .stat-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .stat-bar .home-fill { height: 100%; background: #00d4aa; margin-left: auto; transition: width 0.5s; }
        .stat-bar .away-fill { height: 100%; background: #ff6b6b; transition: width 0.5s; }
        
        .predictions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pred-card { background: #1a1a2e; border-radius: 10px; padding: 15px; text-align: center; }
        .pred-card .icon { font-size: 1.5rem; margin-bottom: 5px; }
        .pred-card .label { color: #888; font-size: 0.8rem; }
        .pred-card .values { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .pred-card .values span:first-child { color: #00d4aa; }
        .pred-card .values span:last-child { color: #ff6b6b; }
        
        .prob-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .prob-card { background: #0f0f1a; border-radius: 10px; padding: 15px; text-align: center; border-left: 3px solid #333; }
        .prob-card.high { border-color: #ff6b6b; }
        .prob-card.medium { border-color: #feca57; }
        .prob-card.low { border-color: #00d4aa; }
        .prob-card .label { color: #888; font-size: 0.85rem; }
        .prob-card .value { font-size: 1.5rem; font-weight: bold; margin: 8px 0; }
        .risk-badge { display: inline-block; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; }
        .risk-high { background: #ff6b6b; color: #0f0f1a; }
        .risk-medium { background: #feca57; color: #0f0f1a; }
        .risk-low { background: #00d4aa; color: #0f0f1a; }
        
        .recommendations { background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(0,212,170,0.05)); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .recommendations h3 { color: #00d4aa; margin-bottom: 15px; }
        .rec-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: #0f0f1a; border-radius: 8px; margin-bottom: 8px; }
        .rec-item .icon { font-size: 1.2rem; }
        .rec-item .info { flex: 1; }
        .rec-item .type { font-weight: bold; font-size: 0.95rem; }
        .rec-item .risk { font-size: 0.8rem; color: #888; }
        .rec-item .odd { font-size: 1.3rem; font-weight: bold; color: #00d4aa; }
        
        .insights-list { margin-top: 15px; }
        .insight-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(254,202,87,0.1); border-radius: 8px; margin-bottom: 8px; }
        .insight-item .num { background: #feca57; color: #0f0f1a; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        
        .loading { text-align: center; padding: 40px; color: #888; }
        .empty { text-align: center; padding: 40px; color: #888; }
        
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .prob-grid, .predictions-grid { grid-template-columns: 1fr; }
            .stat-row { grid-template-columns: 40px 1fr 60px 1fr 40px; font-size: 0.85rem; }
            .modal-content { padding: 20px; }
            .modal-teams { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ BetSave</h1>
            <p>Assistente de Análise para Jogos de Futebol</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('live')">🔴 Ao Vivo</button>
            <button class="tab" onclick="showTab('upcoming')">📅 Próximos</button>
            <button class="tab" onclick="showTab('search')">🔍 Analisar Times</button>
        </div>
        
        <div id="liveSection" class="matches-section active">
            <button onclick="loadMatches('live')" style="margin-bottom: 20px;">🔄 Atualizar</button>
            <div id="liveList"></div>
        </div>
        
        <div id="upcomingSection" class="matches-section">
            <button onclick="loadMatches('upcoming')" style="margin-bottom: 20px;">🔄 Atualizar</button>
            <div id="upcomingList"></div>
        </div>
        
        <div id="searchSection" class="search-section">
            <div class="search-row">
                <select id="homeTeam"><option value="">Selecione o Mandante</option></select>
                <span class="vs">VS</span>
                <select id="awayTeam"><option value="">Selecione o Visitante</option></select>
                <button onclick="analyzeMatch()">Analisar</button>
            </div>
        </div>
    </div>
    
    <div id="analysisModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <div class="modal-teams">
                    <span class="modal-team" id="modalHome">-</span>
                    <span class="modal-vs">VS</span>
                    <span class="modal-team" id="modalAway">-</span>
                </div>
                <span class="modal-league" id="modalLeague">-</span>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <script>
        let allTeams = [];
        let currentMatches = [];
        
        async function init() {
            try {
                const res = await fetch('/api/teams');
                const data = await res.json();
                allTeams = data.teams || [];
            } catch {
                allTeams = ['Manchester City', 'Liverpool', 'Arsenal', 'Chelsea', 'Real Madrid', 'Barcelona', 'PSG', 'Marseille'];
            }
            populateSelects();
            loadMatches('upcoming');
        }
        
        function populateSelects() {
            const homeSelect = document.getElementById('homeTeam');
            const awaySelect = document.getElementById('awayTeam');
            homeSelect.innerHTML = '<option value="">Selecione o Mandante</option>';
            awaySelect.innerHTML = '<option value="">Selecione o Visitante</option>';
            allTeams.forEach(team => {
                homeSelect.innerHTML += `<option value="${team}">${team}</option>`;
                awaySelect.innerHTML += `<option value="${team}">${team}</option>`;
            });
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.matches-section, .search-section').forEach(s => s.classList.remove('active'));
            
            const tabs = ['live', 'upcoming', 'search'];
            const idx = tabs.indexOf(tab);
            document.querySelectorAll('.tab')[idx]?.classList.add('active');
            
            if (tab === 'live') {
                document.getElementById('liveSection').classList.add('active');
            } else if (tab === 'upcoming') {
                document.getElementById('upcomingSection').classList.add('active');
            } else {
                document.getElementById('searchSection').classList.add('active');
            }
        }
        
        async function loadMatches(type) {
            let container;
            if (type === 'live') container = document.getElementById('liveList');
            else if (type === 'upcoming') container = document.getElementById('upcomingList');
            else return;
            
            container.innerHTML = '<div class="loading">Carregando jogos...</div>';
            
            try {
                const url = type === 'live' ? '/api/live' : '/api/matches';
                const res = await fetch(url);
                const data = await res.json();
                const matches = data.matches || [];
                
                if (matches.length === 0) {
                    container.innerHTML = '<div class="empty">Nenhum jogo encontrado</div>';
                    return;
                }
                
                if (type === 'live') {
                    renderLiveMatches(container, matches);
                } else {
                    renderUpcomingMatches(container, matches);
                }
            } catch (e) {
                container.innerHTML = '<div class="empty">Erro ao carregar jogos</div>';
            }
        }
        
        function renderLiveMatches(container, matches) {
            container.innerHTML = `<div style="color:#00d4aa;font-size:1.1rem;margin-bottom:15px;">🔴 ${matches.length} jogos ao vivo</div>`;
            
            let html = '<div class="matches-grid">';
            matches.forEach(m => {
                const score = m.score || '-';
                html += `
                    <div class="match-card" onclick="openAnalysis('${m.home}', '${m.away}', '${m.league}')" style="border-color:#ff6b6b;">
                        <div class="match-league">${m.league}</div>
                        <div class="match-teams">
                            <span class="match-team">${m.home}</span>
                            <span class="match-score" style="color:#ff6b6b;">${score}</span>
                            <span class="match-team away">${m.away}</span>
                        </div>
                        <div class="match-time" style="color:#ff6b6b;">🔴 AO VIVO</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        function renderUpcomingMatches(container, matches) {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            const dayAfter = new Date(Date.now() + 172800000).toISOString().split('T')[0];
            
            const todayMatches = matches.filter(m => m.date === today || m.status === 'today');
            const tomorrowMatches = matches.filter(m => m.date === tomorrow || m.status === 'tomorrow');
            const weekMatches = matches.filter(m => {
                const d = m.date;
                return d > dayAfter && (!m.status || m.status === 'upcoming');
            });
            
            let html = '';
            if (todayMatches.length > 0) html += createDateGroup('Hoje', todayMatches);
            if (tomorrowMatches.length > 0) html += createDateGroup('Amanhã', tomorrowMatches);
            
            if (weekMatches.length > 0) {
                const byDate = {};
                weekMatches.forEach(m => {
                    const d = m.date;
                    if (!byDate[d]) byDate[d] = [];
                    byDate[d].push(m);
                });
                Object.keys(byDate).sort().forEach(date => {
                    html += createDateGroup(formatDate(date), byDate[date]);
                });
            }
            
            container.innerHTML = html || '<div class="empty">Nenhum jogo futuro encontrado</div>';
        }
        
        function renderPastMatches(container) {
            const pastMatches = currentMatches.filter(m => m.status === 'finished' || m.homeScore !== undefined);
            if (pastMatches.length === 0) {
                container.innerHTML = '<div class="empty">Nenhum jogo passado encontrado</div>';
                return;
            }
            
            const byDate = {};
            pastMatches.forEach(m => {
                const d = m.date;
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(m);
            });
            
            let html = '';
            Object.keys(byDate).sort().reverse().forEach(date => {
                html += createDateGroup(formatDate(date), byDate[date], true);
            });
            container.innerHTML = html || '<div class="empty">Nenhum jogo passado encontrado</div>';
        }
        
        function createDateGroup(label, matches, showScore = false) {
            return `
                <div class="date-group">
                    <div class="date-header">
                        <h2>${label}</h2>
                        <span class="badge">${matches.length} jogo${matches.length > 1 ? 's' : ''}</span>
                    </div>
                    <div class="matches-grid">
                        ${matches.map(m => `
                            <div class="match-card ${showScore ? 'finished' : ''}" onclick="openAnalysis('${m.home}', '${m.away}', '${m.league}')">
                                <div class="match-league">${m.league}</div>
                                <div class="match-teams">
                                    <span class="match-team">${m.home}</span>
                                    <span class="match-score ${showScore ? 'finished' : ''}">${showScore && m.homeScore !== undefined ? `${m.homeScore} - ${m.awayScore}` : (m.time || '--:--')}</span>
                                    <span class="match-team away">${m.away}</span>
                                </div>
                                ${!showScore ? `<div class="match-time">${m.time || ''}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            return date.toLocaleDateString('pt-BR', options);
        }
        
        function openAnalysis(home, away, league) {
            document.getElementById('modalHome').textContent = home;
            document.getElementById('modalAway').textContent = away;
            document.getElementById('modalLeague').textContent = league;
            document.getElementById('modalContent').innerHTML = '<div class="loading">Carregando análise...</div>';
            document.getElementById('analysisModal').classList.add('active');
            
            fetch(`/api/analyze?home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`)
                .then(r => r.json())
                .then(displayAnalysis)
                .catch(() => {
                    document.getElementById('modalContent').innerHTML = '<div class="empty">Erro ao carregar análise</div>';
                });
        }
        
        function closeModal() {
            document.getElementById('analysisModal').classList.remove('active');
        }
        
        function getRisk(p) {
            if (p >= 0.71) return { level: 'BAIXO', emoji: '🟢', class: 'low' };
            if (p >= 0.41) return { level: 'MÉDIO', emoji: '🟡', class: 'medium' };
            return { level: 'ALTO', emoji: '🔴', class: 'high' };
        }
        
        function displayAnalysis(data) {
            if (data.error) {
                document.getElementById('modalContent').innerHTML = `<div class="empty">${data.error}</div>`;
                return;
            }
            
            const lineupHome = data.lineup.home.map(p => 
                `<tr><td class="player-name">${p.name}</td><td class="player-pos">${p.position}</td><td>${p.goals}</td><td>${p.assists}</td></tr>`
            ).join('');
            const lineupAway = data.lineup.away.map(p => 
                `<tr><td class="player-name">${p.name}</td><td class="player-pos">${p.position}</td><td>${p.goals}</td><td>${p.assists}</td></tr>`
            ).join('');
            
            const stats = ['goals', 'assists', 'shots', 'fouls', 'cards'];
            let statsHtml = '';
            stats.forEach(stat => {
                const homeVal = data.teamStats.home[stat];
                const awayVal = data.teamStats.away[stat];
                const total = homeVal + awayVal || 1;
                const homePct = (homeVal / total) * 100;
                const label = { goals: 'Gols', assists: 'Assist.', shots: 'Finaliz.', fouls: 'Faltas', cards: 'Cartões' }[stat];
                statsHtml += `<div class="stat-row"><span class="home-val">${homeVal}</span><div class="stat-bar"><div class="home-fill" style="width:${homePct}%"></div></div><span class="label">${label}</span><div class="stat-bar"><div class="away-fill" style="width:${100-homePct}%"></div></div><span class="away-val">${awayVal}</span></div>`;
            });
            
            const homeProb = parseFloat(data.probabilities.home);
            const drawProb = parseFloat(data.probabilities.draw);
            const awayProb = parseFloat(data.probabilities.away);
            
            const homeRisk = getRisk(homeProb);
            const drawRisk = getRisk(drawProb);
            const awayRisk = getRisk(awayProb);
            
            const recsHtml = data.recommendations.map(r => 
                `<div class="rec-item"><span class="icon">${r.risk.emoji}</span><div class="info"><div class="type">${r.type}</div><div class="risk">Risco: ${r.risk.level} (${r.risk.percentage}%)</div></div><span class="odd">${r.odd}</span></div>`
            ).join('') || '<div class="empty">Nenhuma recomendação</div>';
            
            const insightsHtml = data.insights.map((ins, i) => 
                `<div class="insight-item"><span class="num">${i+1}</span><span>${ins}</span></div>`
            ).join('') || '<div class="empty">Nenhum insight disponível</div>';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="grid-2">
                    <div class="card" style="margin-top:0">
                        <h3>📋 ${data.match.home}</h3>
                        <table class="lineup-table"><thead><tr><th>Jogador</th><th>Pos</th><th>G</th><th>A</th></tr></thead><tbody>${lineupHome}</tbody></table>
                    </div>
                    <div class="card" style="margin-top:0">
                        <h3>📋 ${data.match.away}</h3>
                        <table class="lineup-table"><thead><tr><th>Jogador</th><th>Pos</th><th>G</th><th>A</th></tr></thead><tbody>${lineupAway}</tbody></table>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📊 Estatísticas Comparativas</h3>
                    <div class="stats-comparison">${statsHtml}</div>
                </div>
                
                <div class="card">
                    <h3>🎯 Previsões</h3>
                    <div class="predictions-grid">
                        <div class="pred-card"><div class="icon">⚽</div><div class="label">Escanteios</div><div class="values"><span>${data.predictions.corners.home}</span> - <span>${data.predictions.corners.away}</span></div></div>
                        <div class="pred-card"><div class="icon">🟨</div><div class="label">Cartões</div><div class="values"><span>${data.predictions.cards.home}</span> - <span>${data.predictions.cards.away}</span></div></div>
                        <div class="pred-card"><div class="icon">⚠️</div><div class="label">Faltas</div><div class="values"><span>${data.predictions.fouls.home}</span> - <span>${data.predictions.fouls.away}</span></div></div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📈 Probabilidades</h3>
                    <div class="prob-grid">
                        <div class="prob-card ${homeRisk.class}"><div class="label">${data.match.home}</div><div class="value">${Math.round(homeProb * 100)}%</div><span class="risk-badge risk-${homeRisk.class}">${homeRisk.emoji} ${homeRisk.level}</span></div>
                        <div class="prob-card ${drawRisk.class}"><div class="label">Empate</div><div class="value">${Math.round(drawProb * 100)}%</div><span class="risk-badge risk-${drawRisk.class}">${drawRisk.emoji} ${drawRisk.level}</span></div>
                        <div class="prob-card ${awayRisk.class}"><div class="label">${data.match.away}</div><div class="value">${Math.round(awayProb * 100)}%</div><span class="risk-badge risk-${awayRisk.class}">${awayRisk.emoji} ${awayRisk.level}</span></div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>💡 Insights</h3>
                    <div class="insights-list">${insightsHtml}</div>
                </div>
                
                <div class="recommendations">
                    <h3>🎯 Recomendações</h3>
                    ${recsHtml}
                </div>
            `;
        }
        
        function analyzeMatch() {
            const home = document.getElementById('homeTeam').value;
            const away = document.getElementById('awayTeam').value;
            if (!home || !away) { alert('Selecione ambos os times'); return; }
            openAnalysis(home, away, 'Análise Personalizada');
        }
        
        document.getElementById('analysisModal').addEventListener('click', (e) => {
            if (e.target.id === 'analysisModal') closeModal();
        });
        
        init();
    </script>
</body>
</html>
